<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasibul Shanto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #0c0c0b;
    --border: rgba(255,255,255,0.07);
    --muted:  #3a3835;
    --label:  #2e2c2a;
    --accent: #c8a96e;
  }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
  }

  .topbar-name {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .topbar-role {
    font-size: 10px;
    color: var(--label);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  /* ── SLOT ── */
  .slot {
    position: relative;
    background: var(--bg);
    aspect-ratio: 16 / 10;
    overflow: hidden;
    cursor: default;
  }

  .slot.has-image { cursor: zoom-in; }

  /* crosshair placeholder */
  .slot-ph {
    position: absolute;
    inset: 0;
    transition: opacity 0.3s;
  }

  .slot-ph::before,
  .slot-ph::after {
    content: '';
    position: absolute;
    background: var(--border);
  }

  .slot-ph::before { width: 1px; height: 18px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .slot-ph::after  { width: 18px; height: 1px; top: 50%; left: 50%; transform: translate(-50%,-50%); }

  .slot.has-image .slot-ph { opacity: 0; }

  /* image */
  .slot img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    filter: grayscale(10%);
    transition: opacity 0.5s, filter 0.4s, transform 0.6s;
  }

  .slot img.loaded { opacity: 1; }
  .slot:hover img.loaded { filter: grayscale(0%); transform: scale(1.025); }

  /* year label */
  .slot-year {
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 9px;
    color: var(--label);
    letter-spacing: 0.1em;
    line-height: 1;
    user-select: none;
    z-index: 2;
    transition: color 0.2s;
  }

  .slot:hover .slot-year { color: var(--muted); }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(12,12,11,0.94);
    z-index: 100;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    filter: none;
  }

  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
  }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px;
    border-top: 1px solid var(--border);
  }

  .footer-name {
    font-size: 9px;
    color: var(--label);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .footer-links {
    display: flex;
    gap: 28px;
  }

  .footer-links a {
    font-size: 9px;
    color: var(--label);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--accent); }

  /* ── RESPONSIVE ── */
  @media (max-width: 540px) {
    .grid { grid-template-columns: 1fr; }
    .topbar-role { display: none; }
    .footer-links { gap: 16px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-name">Hasibul Shanto</span>
  <span class="topbar-role">Graphics &amp; Motion · AdTech · AI Content</span>
</div>

<!-- GRID — built by JS from manifest.json -->
<div class="grid" id="grid"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lbClose">close</span>
  <img id="lbImg" src="" alt="">
</div>

<!-- FOOTER -->
<div class="footer">
  <span class="footer-name">hasibulhshanto29@gmail.com &nbsp;·&nbsp; +88 01631 336 823</span>
  <div class="footer-links">
    <a href="https://shantorocks.github.io/portfolio/" target="_blank">Portfolio</a>
    <a href="https://www.behance.net/hasibulshanto29" target="_blank">Behance</a>
    <a href="https://www.linkedin.com/in/hasibulshanto29" target="_blank">LinkedIn</a>
  </div>
</div>

<script>
  const YEARS         = ["2021","2022","2023","2024","2025"];
  const SLOTS_PER_YEAR = 6;   // change this if you want more/fewer slots per year
  const grid          = document.getElementById("grid");
  const lightbox      = document.getElementById("lightbox");
  const lbImg         = document.getElementById("lbImg");

  // ── Build grid from manifest.json ──
  fetch("manifest.json")
    .then(r => r.json())
    .then(manifest => {

      YEARS.forEach(year => {
        const images = manifest[year] || [];

        for (let i = 0; i < SLOTS_PER_YEAR; i++) {
          const src  = images[i] || null;
          const slot = document.createElement("div");
          slot.className = "slot" + (src ? " has-image" : "");

          // crosshair placeholder
          const ph = document.createElement("div");
          ph.className = "slot-ph";
          slot.appendChild(ph);

          // image
          const img = document.createElement("img");
          img.alt = year;
          if (src) {
            img.src = src;
            img.onload = () => img.classList.add("loaded");
            // lightbox click
            slot.addEventListener("click", () => openLightbox(src));
          }
          slot.appendChild(img);

          // year label
          const label = document.createElement("span");
          label.className = "slot-year";
          label.textContent = year;
          slot.appendChild(label);

          grid.appendChild(slot);
        }
      });
    })
    .catch(() => {
      // manifest not found — render all empty slots
      YEARS.forEach(year => {
        for (let i = 0; i < SLOTS_PER_YEAR; i++) {
          const slot = document.createElement("div");
          slot.className = "slot";
          slot.innerHTML = `<div class="slot-ph"></div><img alt="${year}"><span class="slot-year">${year}</span>`;
          grid.appendChild(slot);
        }
      });
    });

  // ── Lightbox ──
  function openLightbox(src) {
    lbImg.src = src;
    lightbox.classList.add("open");
  }

  lightbox.addEventListener("click", () => lightbox.classList.remove("open"));
  document.getElementById("lbClose").addEventListener("click", e => {
    e.stopPropagation();
    lightbox.classList.remove("open");
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") lightbox.classList.remove("open");
  });
</script>

</body>
</html>
